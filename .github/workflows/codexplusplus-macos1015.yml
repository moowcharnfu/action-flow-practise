# macos-15-intel 打x86包
name: Release-codexplusplus CI

on:
  workflow_dispatch: # 允许手动触发，方便测试
  # push:
    # tags:
      # - 'clone*' # 触发标签或者分支
      
permissions:
  contents: write # 必须授予写入权限才能上传 Release

jobs:
  build-tauri:
    strategy:
      fail-fast: false # 防翻车配置：一个平台失败不影响其他平台继续构建
      matrix:
        include:
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            bundle: macos-x86_64
            deployment_target: '10.15'
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: macos-aarch64
            deployment_target: '11.0'

    runs-on: ${{ matrix.platform }}
    env:
      ACTIONS_RUNNER_DEBUG: true # 开启 Runner 调试日志
      ACTIONS_STEP_DEBUG: true   # 开启步骤调试日志（推荐同时开启）
    steps:
      - uses: actions/checkout@v4

      - name: Get latest tag from upstream repo
        id: get_tag
        env:
          REPO: BigPizzaV3/CodexPlusPlus
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 如果是私有仓库请改用有访问权限的 PAT
        shell: bash
        run: |
          # 1) 先尝试用 releases/latest（仓库有 release 时很可靠）
          tag=$(curl -s -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/latest" \
            | python3 -c "import sys,json; j=json.load(sys.stdin); print(j.get('tag_name') or '')")
          # 2) 如果没有 release，再用 tags 列表取第一个（按 API 返回顺序，或 per_page=1）
          if [ -z "$tag" ]; then
            tag=$(curl -s -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/tags?per_page=1" \
              | python3 -c "import sys,json; j=json.load(sys.stdin); print(j[0]['name'] if j else '')")
          fi
          # 失败处理（可改为 fallback 到主分支或直接报错）
          if [ -z "$tag" ]; then
            echo "No tag found from API" >&2
            exit 1
          fi
          echo "Found tag: $tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT

      # 1. 从外部克隆代码（替换为你的真实仓库地址）
      - name: Clone external repository
        run: git clone https://github.com/BigPizzaV3/CodexPlusPlus.git --branch ${{ steps.get_tag.outputs.tag }} --depth 1 repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add macOS targets
        working-directory: repo
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
          rustup target list --installed

      - name: Set macOS deployment target
        working-directory: repo
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: repo/apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: repo/apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        working-directory: repo
        run: cargo build --release --target ${{ matrix.target }}

      - name: List Build bundle
        working-directory: repo
        run: |
          echo "构建的文件："
          ls -R ./target/

      - name: Upload bundle(dmg-${{ matrix.bundle }})
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.bundle }}.dmg
          path: repo/target/*/release/**/*.dmg
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-tauri
    runs-on: ubuntu-latest
    # 可选：如果坚持使用 GITHUB_TOKEN，需在此处声明 permissions: contents: write
    # 但使用 PAT 时，权限由 PAT 本身的 scope 决定，此处可不写或保留默认
    env:
      ACTIONS_RUNNER_DEBUG: true # 开启 Runner 调试日志
      ACTIONS_STEP_DEBUG: true   # 开启步骤调试日志（推荐同时开启）
    steps:
      # 设置时间戳
      - name: Get Current Time
        id: time_step # 设置 step ID，以便后续引用
        run: echo "current_time=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Use Current Time
        run: echo "The current time is ${{ steps.time_step.outputs.current_time }}"
        
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: ./release-assets

      - name: List Downloaded Assets
        run: |
          echo "下载的资产文件："
          if [ -d "./release-assets" ]; then
            files=$(find ./release-assets -type f)
            if [ -z "$files" ]; then
              echo "No asset files found in ./release-assets"
            else
              find ./release-assets -type f -exec ls -lh {} \;
            fi
          else
            echo "./release-assets does not exist; no artifacts downloaded."
          fi

      - name: Generate Checksums
        run: |
          # 确保目录存在，避免因为没有下载到任何资产而 cd 失败
          mkdir -p ./release-assets
          cd ./release-assets
          
          # 列出所有文件
          echo "当前目录文件列表："
          ls -la
          
          # 创建校验和文件
          > checksums.txt
          
          # 处理所有非校验和文件
          file_count=0
          for file in *; do
            if [ -f "$file" ] && [ "$file" != "checksums.txt" ]; then
              echo "为文件 '$file' 生成校验和..."
              sha256sum "$file" >> checksums.txt
              file_count=$((file_count + 1))
            fi
          done
          
          if [ $file_count -eq 0 ]; then
            echo "警告：没有找到任何资产文件，创建占位符"
            echo "no_assets_available" > placeholder.txt
            sha256sum placeholder.txt >> checksums.txt
            rm placeholder.txt
          fi
          
          echo "生成的校验和："
          cat checksums.txt
          echo "文件大小：" $(wc -c < checksums.txt) "字节"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/*
            ./release-assets/**/*
          tag_name: ${{ github.ref_name }}-${{ steps.time_step.outputs.current_time }}
          name: Release-codexplusplus-${{ github.ref_name }}-${{ steps.time_step.outputs.current_time }}
          body: |
            Automated release for ${{ github.ref_name }}.
            
            &zwnj;**校验和：**&zwnj;
            ```
             只做mac低版本构建, 非低版本请从原项目处下载, 本处不做签名验证
            ```
          draft: false
          prerelease: false
          # 关键修改：使用 PAT 令牌
          # token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}  
